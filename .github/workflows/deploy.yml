name: Deploy Backend

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'template.json'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'template.json'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-west-2' }}
  SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME || 'devops-backend' }}

jobs:
  validate:
    name: Validate SAM App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: SAM Validate
        run: sam validate --template-file template.json

      - name: SAM Build
        run: sam build --template-file template.json

  deploy:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-devops-backend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: SAM Build
        run: sam build --template-file template.json

      - name: Deploy SAM Stack
        run: >
          sam deploy
          --stack-name "${{ env.SAM_STACK_NAME }}"
          --region "${{ env.AWS_REGION }}"
          --resolve-s3
          --capabilities CAPABILITY_IAM
          --no-confirm-changeset
          --no-fail-on-empty-changeset
